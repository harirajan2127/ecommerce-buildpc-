<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory (RAM)</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">
<div class="logo">BuildPC</div>
<input type="text" placeholder="Search components..." class="search">
<div class="icons">
<i class="fa-regular fa-heart"></i>
<i class="fa-solid fa-cart-shopping"></i>
<i class="fa-regular fa-user"></i>
</div>
</nav>

<h1 class="page-title">Memory (RAM)</h1>

<div class="product-grid">

<div class="card">
<img src="images/8GB DDR4 3200MHz.jpg" alt="8GB DDR4 3200MHz RAM">
<h3>8GB DDR4</h3>
<p class="price">₹2,499</p>
<button class="btn-cart">Add to Cart</button>
<button class="btn-buy">Buy Now</button>
</div>

<div class="card">
<img src="images/16GB DDR4 3200MHz.jpg" alt="16GB DDR4 3200MHz RAM">
<h3>16GB DDR4</h3>
<p class="price">₹4,999</p>
<button class="btn-cart">Add to Cart</button>
<button class="btn-buy">Buy Now</button>
</div>

<div class="card">
<img src="images/16GB DDR5.jpg" alt="16GB DDR5 RAM">
<h3>16GB DDR5</h3>
<p class="price">₹6,999</p>
<button class="btn-cart">Add to Cart</button>
<button class="btn-buy">Buy Now</button>
</div>

<div class="card">
<img src="images/32GB DDR4.jpg" alt="32GB DDR4 RAM">
<h3>32GB DDR4</h3>
<p class="price">₹8,999</p>
<button class="btn-cart">Add to Cart</button>
<button class="btn-buy">Buy Now</button>
</div>

<div class="card">
<img src="images/32GB DDR5.jpg" alt="32GB DDR5 RAM">
<h3>32GB DDR5</h3>
<p class="price">₹12,999</p>
<button class="btn-cart">Add to Cart</button>
<button class="btn-buy">Buy Now</button>
</div>

</div>

</html>
