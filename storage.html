<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storage Devices</title>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">
    <div class="logo">BuildPC</div>

    <input type="text" placeholder="Search components..." class="search">

    <div class="icons">
        <i class="fa-regular fa-heart"></i>
        <i class="fa-solid fa-cart-shopping"></i>
        <i class="fa-regular fa-user"></i>
    </div>
</nav>

<h1 class="page-title">Storage Devices</h1>

<div class="product-grid">

    <div class="card">
        <img src="images/1TB NVMe.jpg" alt="1TB NVMe Storage">
        <h3>1TB NVMe</h3>
        <p class="price">₹6,499</p>
        <button class="btn-cart">Add to Cart</button>
        <button class="btn-buy">Buy Now</button>
    </div>

    <div class="card">
        <img src="images/2TB NVMe.jpg" alt="2TB NVMe Storage">
        <h3>2TB NVMe</h3>
        <p class="price">₹10,999</p>
        <button class="btn-cart">Add to Cart</button>
        <button class="btn-buy">Buy Now</button>
    </div>

    <div class="card">
        <img src="images/256GB SATA SSD.jpg" alt="256GB SATA SSD">
        <h3>256GB SATA SSD</h3>
        <p class="price">₹2,199</p>
        <button class="btn-cart">Add to Cart</button>
        <button class="btn-buy">Buy Now</button>
    </div>

    <div class="card">
        <img src="images/512GB NVMe.jpg" alt="512GB NVMe Storage">
        <h3>512GB NVMe</h3>
        <p class="price">₹4,999</p>
        <button class="btn-cart">Add to Cart</button>
        <button class="btn-buy">Buy Now</button>
    </div>

    <div class="card">
        <img src="images/512GB SATA SSD.jpg" alt="512GB SATA SSD">
        <h3>512GB SATA SSD</h3>
        <p class="price">₹3,999</p>
        <button class="btn-cart">Add to Cart</button>
        <button class="btn-buy">Buy Now</button>
    </div>

</div>

</body>
</html>
