<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build Your PC</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">
    <div class="logo">
        <i class="fa-solid fa-computer"></i> BuildPC
    </div>

    <input type="text" placeholder="Search components..." class="search">

    <div class="icons">
        <i class="fa-regular fa-heart"></i>
        <i class="fa-solid fa-cart-shopping"></i>
        <i class="fa-regular fa-user"></i>
    </div>
</nav>

<header class="hero">
    <h1>Build Your Dream PC</h1>
    <p>Select a category to start building</p>
</header>

<section class="main-categories">

    <a href="storage.html" class="category-card">
        <img src="images/1TB NVMe.jpg" alt="Storage Devices">
        <h2>Storage Devices</h2>
    </a>

    <a href="memory.html" class="category-card">
        <img src="images/32GB DDR5.jpg" alt="32GB DDR5 Memory RAM">
        <h2>Memory (RAM)</h2>
    </a>

    <a href="motherboard.html" class="category-card">
        <img src="images/ASUS Z690.jpg" alt="ASUS Z690 Motherboard">
        <h2>Motherboard</h2>
    </a>

    <a href="processing.html" class="category-card">
        <img src="images/i7.jpg" alt="Intel i7 Processor">
        <h2>Processing Components</h2>
    </a>

    <a href="power.html" class="category-card">
        <img src="images/RGB Gaming Case.jpg" alt="RGB Gaming Case">
        <h2>Power & Case</h2>
    </a>

</section>

</body>
</html>
