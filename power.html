<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Power & Case</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">
<div class="logo">BuildPC</div>
<input type="text" placeholder="Search components..." class="search">
<div class="icons">
<i class="fa-regular fa-heart"></i>
<i class="fa-solid fa-cart-shopping"></i>
<i class="fa-regular fa-user"></i>
</div>
</nav>

<h1 class="page-title">Power & Case</h1>

<div class="product-grid">

<div class="card">
<img src="images/450w.jpg" alt="450W SMPS">
<h3>450W SMPS</h3>
<p class="price">₹2,199</p>
<button class="btn-cart">Add to Cart</button>
<button class="btn-buy">Buy Now</button>
</div>
<div class="card">
<img src="images/650w.jpg" alt="650W SMPS">
<h3>650W SMPS</h3>
<p class="price">₹3,999</p>
<button class="btn-cart">Add to Cart</button>
<button class="btn-buy">Buy Now</button>
</div>
<div class="card">
<img src="images/750w.jpg" alt="750W SMPS">
<h3>750W SMPS</h3>
<p class="price">₹4,999</p>
<button class="btn-cart">Add to Cart</button>
<button class="btn-buy">Buy Now</button>
</div>



<div class="card">
<img src="images/Tempered Glass Case.jpg" alt="Tempered Glass Case">
<h3>Tempered Glass Case</h3>
<p class="price">₹4,499</p>
<button class="btn-cart">Add to Cart</button>
<button class="btn-buy">Buy Now</button>
</div>

<div class="card">
<img src="images/RGB Gaming Case.jpg" alt="RGB Gaming Case">
<h3>RGB Gaming Case</h3>
<p class="price">₹5,999</p>
<button class="btn-cart">Add to Cart</button>
<button class="btn-buy">Buy Now</button>
</div>

<div class="card">
<img src="images/Full Tower Case.jpg" alt="Full Tower Case">
<h3>Full Tower Case</h3>
<p class="price">₹6,999</p>
<button class="btn-cart">Add to Cart</button>
<button class="btn-buy">Buy Now</button>
</div>

</div>

</body>
</html>
